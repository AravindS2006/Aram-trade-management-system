[runtime]
mode = "backtest"
timezone = "Asia/Kolkata"

[data]
default_symbol = "RELIANCE.NS"
default_interval = "1m"
use_cache = true

[portfolio]
initial_capital = 100000.0
commission_per_order = 20.0
slippage = 0.0005

[risk]
risk_per_trade_pct = 0.01
stop_loss_pct = 0.01
take_profit_pct = 0.02
trailing_stop_pct = 0.005
