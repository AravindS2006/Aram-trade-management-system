repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: true
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: true
        types: [python]

      - id: mypy-src
        name: mypy src
        entry: uv run mypy src
        language: system
        pass_filenames: false

      - id: pytest-unit
        name: pytest unit
        entry: uv run pytest tests/unit -q
        language: system
        pass_filenames: false

      - id: bandit-src
        name: bandit security scan
        entry: uv run bandit -r src scripts
        language: system
        pass_filenames: false

      - id: vulture-src
        name: vulture dead code scan
        entry: uv run vulture src scripts
        language: system
        pass_filenames: false
