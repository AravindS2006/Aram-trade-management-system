system:
  name: "Aram Trade Management System"
  version: "1.0.0"
  mode: "backtest"
  log_level: "INFO"
  timezone: "Asia/Kolkata"

trading:
  initial_capital: 1000000
  currency: "INR"
  exchange: "NSE"
  segment: "equity"
  default_product_type: "CNC"

data:
  yfinance_cache_dir: "data/cache/"
  csv_data_dir: "data/raw/csv/"
  processed_dir: "data/processed/"
  results_dir: "data/results/"
  auto_source_threshold_years: 2

risk:
  max_drawdown_stop: 0.15
  daily_loss_limit: 0.03
  max_open_positions: 20
  max_sector_concentration: 0.30
  max_single_stock_pct: 0.05
  cash_buffer: 0.10
  risk_per_trade: 0.01
  max_risk_per_trade: 0.02
  min_rr_ratio: 2.0
  max_order_value: 500000
  consecutive_loss_halt: 5
  max_orders_per_minute: 10
  position_sizing: "fixed_fractional"

backtesting:
  default_engine: "vectorbt"
  default_universe: "nifty50"
  benchmark: "^NSEI"
  risk_free_rate: 0.065
  slippage_pct: 0.0005
  include_transaction_costs: true

transaction_costs:
  equity_delivery:
    brokerage: 0
    stt_sell: 0.001
    exchange_charges: 0.0000345
    sebi_charges: 0.000001
    dp_charges: 15.93
    gst_rate: 0.18
    stamp_duty_buy: 0.00015
  equity_intraday:
    brokerage: 20
    stt_sell: 0.00025
    exchange_charges: 0.0000345
    sebi_charges: 0.000001
    gst_rate: 0.18
    stamp_duty_buy: 0.00003
  futures:
    brokerage: 20
    stt_sell: 0.0001
    exchange_charges: 0.0000019
    sebi_charges: 0.000001
    gst_rate: 0.18
    stamp_duty_buy: 0.00002

dhanhq:
  base_url: "https://api.dhan.co"
  sandbox: true
  timeout_seconds: 30
  rate_limit_per_second: 10
  websocket_reconnect_attempts: 5

dashboard:
  port: 8501
  host: "localhost"
  auto_refresh_seconds: 30
  dark_theme: true
  default_chart_height: 400

notifications:
  enabled: false
  on_trade_execution: true
  on_drawdown_breach: true
  on_daily_pnl_summary: true
  on_circuit_breaker: true

logging:
  file: "logs/aram_tms.log"
  rotation: "1 day"
  retention: "30 days"
  level: "DEBUG"
